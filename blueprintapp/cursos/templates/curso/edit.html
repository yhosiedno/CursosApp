{% extends 'base.html' %}

{% block content %}

<div class="card card-custom p-4">

    <h2 class="mb-4">
        Editar Curso
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Nombre</label>

            <input type="text"
                   name="nombre"
                   value="{{ curso.nombre }}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Descripción</label>

            <textarea name="descripcion"
                      class="form-control"
                      required>{{ curso.descripcion }}</textarea>

        </div>

        <div class="mb-3">

            <label>Estudiante</label>

            <select name="estudiante_id"
                    class="form-select">

                {% for estudiante in estudiantes %}

                <option
                    value="{{ estudiante.id }}"
                    {% if estudiante.id == curso.estudiante_id %}
                    selected
                    {% endif %}
                >

                    {{ estudiante.nombre }}

                </option>

                {% endfor %}

            </select>

        </div>

        <button class="btn btn-primary">

            Actualizar

        </button>

        <a href="/cursos"
           class="btn btn-secondary">

           Volver

        </a>

    </form>

</div>

{% endblock %}
