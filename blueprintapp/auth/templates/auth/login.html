<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container{
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            color: #555;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus{
            outline: none;
            border-color: #007bff;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #0056b3;
        }

        .register-link{
            text-align: center;
            margin-top: 15px;
        }

        .register-link a{
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .register-link a:hover{
            text-decoration: underline;
        }

        .alert{
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        .alert-danger{
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .alert-success{
            background: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .alert-warning{
            background: #fff3cd;
            color: #664d03;
            border: 1px solid #ffecb5;
        }

        .alert-info{
            background: #cff4fc;
            color: #055160;
            border: 1px solid #b6effb;
        }

    </style>
</head>
<body>

    <div class="login-container">

        <h1>Iniciar Sesión</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <label>Usuario</label>

            <input
                type="text"
                name="username"
                placeholder="Ingrese su usuario"
                required
            >

            <label>Contraseña</label>

            <input
                type="password"
                name="password"
                placeholder="Ingrese su contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

        <div class="register-link">
            ¿No tienes cuenta?
            <a href="/auth/register">
                Registrarse
            </a>
        </div>

    </div>

</body>
</html>
