<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-container{
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            color: #555;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus{
            outline: none;
            border-color: #28a745;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #28a745;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #218838;
        }

        .login-link{
            text-align: center;
            margin-top: 15px;
        }

        .login-link a{
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .login-link a:hover{
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="register-container">

        <h1>Registrar Usuario</h1>

        <form method="POST">

            <label>Usuario</label>

            <input
                type="text"
                name="username"
                placeholder="Ingrese un usuario"
                required
            >

            <label>Contraseña</label>

            <input
                type="password"
                name="password"
                placeholder="Ingrese una contraseña"
                required
            >

            <button type="submit">
                Registrar
            </button>

        </form>

        <div class="login-link">
            ¿Ya tienes cuenta?
            <a href="/auth/login">
                Iniciar sesión
            </a>
        </div>

    </div>

</body>
</html>
